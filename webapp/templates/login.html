<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in to the CRISPR4ALL quality-control and visualization pipeline</title>
  <style>
    :root {
      --ink: #12141a;
      --line: #dce2e8;
      --blue: #0b7ef4;
      --bg1: #fdfdfd;
      --bg2: #f7faf8;
      --bg3: #eef3ff;
    }
    body {
      margin: 0;
      font-family: "Public Sans", "Avenir Next", "Segoe UI Variable", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 12%, rgba(22, 167, 78, 0.14), transparent 34%),
        radial-gradient(circle at 85% 22%, rgba(90, 0, 255, 0.10), transparent 36%),
        radial-gradient(circle at 78% 90%, rgba(255, 209, 0, 0.16), transparent 30%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 48%, var(--bg3));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 14px;
    }
    .card {
      width: min(760px, 96vw);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(26, 33, 46, 0.10);
    }
    .hero {
      border: 1px solid #e7ebf0;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.88)),
        linear-gradient(120deg, rgba(11, 126, 244, 0.08), rgba(22, 167, 78, 0.06));
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand img {
      width: 56px;
      height: 74px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #d8dee6;
      background: #fff;
      padding: 4px;
      flex: 0 0 auto;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.1rem, 2.2vw, 1.55rem);
      line-height: 1.24;
    }
    .sub {
      margin: 6px 0 0;
      color: #4c5563;
      font-size: 14px;
    }
    .author {
      margin: 12px 0 0;
      font-size: 13px;
      color: #3b4553;
      font-weight: 600;
    }
    label {
      display: block;
      margin: 10px 0;
      font-size: 14px;
      font-weight: 700;
      color: #202a38;
    }
    input {
      width: 100%;
      margin-top: 6px;
      border: 1px solid #c8d3df;
      border-radius: 10px;
      padding: 9px 10px;
      color: #1d2734;
      background: #fcfdff;
    }
    input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(11, 126, 244, 0.15);
    }
    button {
      margin-top: 12px;
      background: linear-gradient(135deg, #0a70d8, #0b7ef4);
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .msg { margin: 10px 0; font-size: 13px; }
    .error { color: #b91c1c; }
    .notice { color: #0369a1; }
    .signup {
      font-size: 13px;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="hero">
      <div class="brand">
        <img src="/static/isab.svg" alt="ISAB logo">
        <div>
          <h1>Sign in to the CRISPR4ALL quality-control and visualization pipeline</h1>
          <p class="sub">ISAB testbed access for QC analytics and figure generation.</p>
        </div>
      </div>
      <p class="author">Developed at ISAB by Adriano Aguzzi.</p>
    </section>
    {% if error %}<div class="msg error">{{ error }}</div>{% endif %}
    {% if notice %}<div class="msg notice">{{ notice }}</div>{% endif %}
    <form action="/auth/login" method="post">
      <label>User ID
        <input name="user_id" type="text" required />
      </label>
      <label>Password
        <input name="password" type="password" required />
      </label>
      <button type="submit">Sign in</button>
    </form>
    <p class="signup">No access yet? <a href="/auth/signup">Request authorization</a></p>
  </main>
</body>
</html>
